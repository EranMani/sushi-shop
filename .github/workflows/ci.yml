name: CI

# Runs on every push to main and on every pull request.
# Two jobs: lint (ruff) then test (pytest with real postgres + redis).
# Test job depends on lint passing — no point running tests against broken code.

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run ruff
        run: ruff check .

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint  # Only run tests if lint passes

    # Spin up PostgreSQL and Redis as GitHub Actions service containers.
    # These are available to the test job at localhost on their standard ports.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sushi
          POSTGRES_PASSWORD: sushi
          POSTGRES_DB: sushi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sushi -d sushi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://sushi:sushi@localhost:5432/sushi_test
      TEST_DATABASE_URL: postgresql+asyncpg://sushi:sushi@localhost:5432/sushi_test
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: test-key-not-used-in-unit-tests
      OPENAI_API_KEY: test-key-not-used-in-unit-tests
      APP_ENV: test
      CACHE_TTL_SECONDS: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run pytest
        run: pytest
