version: "3.9"

# docker-compose.test.yml — Test database service
#
# Used by the test suite to provide an isolated PostgreSQL instance.
# The test database is named `sushi_test` to prevent any accidental collision
# with the development database.
#
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   make test   (handles this automatically)
#
# The test suite connects via TEST_DATABASE_URL from .env.
# Every test wraps in a transaction that rolls back — no persistent state between tests.

services:

  db_test:
    image: postgres:16
    environment:
      POSTGRES_USER: sushi
      POSTGRES_PASSWORD: sushi
      POSTGRES_DB: sushi_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sushi -d sushi_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # tmpfs mount: test database lives in memory for speed.
    # Data is lost when the container stops — which is what we want for tests.
    tmpfs:
      - /var/lib/postgresql/data
