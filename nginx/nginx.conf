# nginx/nginx.conf — Nginx load balancer configuration
#
# Commit 01: Minimal functional proxy — upstream to api:8000, port 80.
# No rate limiting in this commit — that is Commit 15 (nginx-load-balancer-rate-limiter).
#
# The upstream block uses the service name "api" which Docker Compose resolves
# via its internal DNS. When scaled (--scale api=3), Docker round-robins across
# all healthy replicas automatically through its internal load balancer.
#
# Commit 15 will add:
#   - limit_req_zone: 10 req/s per IP on all routes
#   - limit_req_zone: 2 req/min per IP on /agent/chat
#   - Passive upstream health check (3 failures removes upstream for 30s)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Upstream: FastAPI application instances.
    # Docker Compose resolves "api" to the container IP(s).
    # Round-robin is the default when multiple replicas are running.
    upstream fastapi {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # Forward all requests to the FastAPI upstream
        location / {
            proxy_pass http://fastapi;

            # Preserve the original client information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings — agent LLM calls can take several seconds
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
