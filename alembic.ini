# alembic.ini
#
# Alembic configuration file.
# Referenced by the `alembic` CLI and by `alembic/env.py`.
# The database URL is intentionally left as a placeholder here —
# `env.py` reads the real URL from the DATABASE_URL environment variable
# at runtime so this file never contains credentials.

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template for new migration filenames
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in migration files
timezone = UTC

# Maximum length of the slug portion of migration filenames
truncate_slug_length = 40

# Output encoding for migration scripts
output_encoding = utf-8

# The sqlalchemy.url is NOT set here — env.py reads DATABASE_URL from the
# environment. If alembic is run without the env var set, env.py raises a
# clear error rather than silently connecting to nothing.
# sqlalchemy.url = (intentionally omitted)


[post_write_hooks]
# No post-write hooks configured. Ruff formatting is run by CI, not Alembic.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
